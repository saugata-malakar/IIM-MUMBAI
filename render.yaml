services:
  # 1. Backend FastAPI Service
  - type: web
    name: medshield-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend_api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # 2. Frontend Next.js Service
  - type: web
    name: medshield-frontend
    env: node
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: BACKEND_URL
        # Automatically pull the live URL from the backend service above!
        fromService:
          type: web
          name: medshield-backend
          envVarKey: RENDER_EXTERNAL_URL
